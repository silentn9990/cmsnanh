<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Món quà  ngày đặc biệt của anh">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Nhạc phát khi click vào màn hình -->
    <audio id="bgm" preload="auto" loop>
        <source src="./nhac.mp3" type="audio/mpeg" />
    </audio>

    <div class="heart-background" id="heart-background" aria-hidden="true"></div>
    <!-- Phần bức thư đầu tiên -->
    <section id="envelope-section">
        <div class="letter">
            <div class="valentines hover-animation" onclick="openEnvelope()">
                <div class="envelope"></div>
                <div class="front"></div>
                <div class="card">
                    <div class="text">Happy<br> Birthday!</div>
                </div>
                <div class="hearts">
                    <div class="one"></div>
                    <div class="two"></div>
                    <div class="three"></div>
                    <div class="four"></div>
                    <div class="five"></div>
                </div>
            </div>
            <div class="shadow"></div>
        </div>
    </section>

    <!-- Phần câu hỏi -->
    <section id="question-section" class="question-ui">
        <!-- Phần thay đổi ảnh liên tục bên file script.js -->
        <img id="main-img" src="" alt="Hình ảnh" />
        <h2 id="main-text">Anh có muốn xem bất ngờ này không ?</h2>

        <div class="button-wrapper" id="button-wrapper">
            <button id="yesBtn" type="button">Có</button>
            <button id="noBtn" type="button">Hông</button>
        </div>
    </section>

    <!-- Phần tin nhắn, nếu muốn thêm dòng thì copy div như bên dưới và thay đổi chữ -->
    <section id="messages-section" class="hidden">
        <div class="messages-container">
            <div class="message-line">Hôm nay là ngày của Boy</div>
            <div class="message-line">Em có một vài lời chúc gửi đến Boy</div>
            <div class="message-line">Mong anh lần này hãy hoan hỉ đón nhận nó lần cuối nhé</div>
            <div class="message-line">Đó chính là...</div>
        </div>
    </section>

    <!-- Phần sau khi hiện chữ xong: thay thế hoàn toàn "mốc kỷ niệm" bằng UI mới -->
    <section id="timeline-section">
        <div class="hearts" id="hearts" aria-hidden="true"></div>

        <div id="new-ui" class="new-ui hidden">
            <div class="boxLetter">
                <div class="formLetter">
                    <div class="wrapperLetter">
                        <div class="giftbox">
                            <div class="img">
                                <img class="framed-photo" src="images/anh10.jpg" alt="Ảnh" />
                            </div>
                        </div>
                        <div class="textLetter">
                            <h2></h2>
                            <p class="contentLetter"></p>
                        </div>
                    </div>
                    <button id="see-gift" class="see-gift-btn hidden" aria-label="Xem quà">Xem quà nè</button>
                </div>
            </div>
        </div>

        <div id="gift-ui" class="gift-ui hidden">
            <div id="heartImagesContainer" class="heart-images-container">
                <audio id="myAudio">
                    <source src="nhac.mp3" type="audio/mp3">
                </audio>
            </div>
        </div>

        <div class="clock-container">
            <div class="date" id="date"></div>
            <div class="time">
                <span id="hours">23</span>:<span id="minutes">59</span>:<span id="seconds">55</span>
            </div>
        </div>
    </section>

    <script src="lang.js"></script>
    <script src="script.js"></script>
</body>

</html>
